name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        run: npm install

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Frontend TypeScript check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Frontend build
        working-directory: frontend
        run: npm run build
